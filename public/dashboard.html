<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1440">
    <title>Dashboard - Área Cafeteria</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-container">
        <header class="admin-header">
            <h1 class="admin-titulo">Painel Administrativo</h1>
            <button id="btn-sair" class="btn-sair">Sair</button>
        </header>
        <main class="admin-main">
            <div class="admin-topo">
                <h2>Produtos</h2>
                <button id="btn-novo" class="btn-novo">+ Novo Produto</button>
            </div>
            <div id="lista-admin" class="admin-lista"></div>
        </main>
        <div id="modal" class="modal" style="display: none;">
            <div class="modal-conteudo">
                <div class="modal-topo">
                    <h2 id="modal-titulo">Novo Produto</h2>
                    <button id="btn-fechar" class="btn-fechar">&times;</button>
                </div>
                <form id="form-produto" class="modal-form">
                    <input type="hidden" id="produto-id">
                    <div class="campo">
                        <label for="produto-nome">Nome</label>
                        <input type="text" id="produto-nome" required>
                    </div>
                    <div class="campo">
                        <label for="produto-descricao">Descrição</label>
                        <textarea id="produto-descricao" required></textarea>
                    </div>
                    <div class="campo">
                        <label for="produto-preco">Preço (R$)</label>
                        <input type="number" id="produto-preco" step="0.01" required>
                    </div>
                    <div class="campo">
                        <label for="produto-imagem">Caminho da imagem</label>
                        <input type="text" id="produto-imagem" required>
                    </div>
                    <button type="submit" class="btn-salvar">Salvar</button>
                </form>
            </div>
        </div>
    </div>
    <script src="js/dashboard.js"></script>
</body>
</html>
