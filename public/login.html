<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1440">
    <title>Login - Área Cafeteria</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-container">
        <div class="login-card">
            <h1 class="login-titulo">Área Administrativa</h1>
            <p class="login-subtitulo">Faça login para gerenciar o cardápio</p>
            <form id="form-login" class="login-form">
                <div class="campo">
                    <label for="nome">Usuário</label>
                    <input type="text" id="nome" placeholder="Digite seu usuário" required>
                </div>
                <div class="campo">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="Digite sua senha" required>
                </div>
                <p id="erro-login" class="erro-texto"></p>
                <button type="submit" class="btn-login">Entrar</button>
            </form>
        </div>
    </div>
    <script src="js/login.js"></script>
</body>
</html>
